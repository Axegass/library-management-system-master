name: CI & Deploy to Staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]  # CI jalan saat ada PR ke staging

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Lint dengan Flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  deploy-staging:
    runs-on: ubuntu-latest
    needs: ci  # ← deploy hanya jalan kalau ci sukses
    if: github.event_name == 'push'  # ← deploy hanya saat push, bukan PR
    steps:
      - uses: actions/checkout@v4

      # ==============================================================================
      # SMOKE TEST DENGAN PLAYWRIGHT (HANYA BERJALAN JIKA CI DI ATAS LULUS)
      # ==============================================================================
      - name: Setup Python untuk Testing
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright pytest
          sudo apt-get update && sudo apt-get install -y libasound2t64
          playwright install chromium

      - name: Build Lokal Image untuk Pengujian
        run: |
          docker build -t library-test:local .

      - name: Jalankan Kontainer Aplikasi Sementara untuk Tes
        run: |
          docker run -d --network host --name web_app \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            library-test:local
          
          sleep 5 

      - name: Eksekusi Playwright Smoke Test
        run: |
          pytest -s tests/test.py

      - name: Bersihkan Kontainer Tes
        if: always()
        run: |
          docker stop web_app && docker rm web_app

      # ==============================================================================
      # TAHAP DEPLOYMENT KE GOOGLE CLOUD (HANYA BERJALAN JIKA SMOKE TEST DI ATAS LULUS)
      # ==============================================================================
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev

      - name: Tag & Push Image ke GCP Artifact Registry
        run: |
          IMAGE="asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/pso"
          # Beri label ulang pada image yang teruji aman tadi tanpa perlu build ulang dari nol
          docker tag library-test:local $IMAGE:$GITHUB_SHA
          docker push $IMAGE:$GITHUB_SHA

      - name: Deploy ke Staging
        run: |
          IMAGE="asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/pso"
          gcloud run deploy my-app-staging \
            --image=$IMAGE:$GITHUB_SHA \
            --platform=managed \
            --region=${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --port=5000 \
            --memory=512Mi \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}"